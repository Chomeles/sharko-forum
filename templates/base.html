{% load static %}<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Forum{% endblock %} · sharko.icu</title>
  <link rel="stylesheet" href="{% static 'forum.css' %}">
</head>
<body>
<header class="site-header">
  <nav class="container">
    <a class="brand" href="{% url 'forum:index' %}">Forum</a>
    <div class="nav-right">
      {% if user.is_authenticated %}
        <span class="muted">{{ user.username }}</span>
        {% if user.is_staff %}<a href="{% url 'admin:index' %}">Admin</a>{% endif %}
        <form method="post" action="{% url 'logout' %}">{% csrf_token %}
          <button type="submit" class="linklike">Log out</button>
        </form>
      {% else %}
        <a href="{% url 'login' %}">Log in</a>
        <a class="btn" href="{% url 'forum:signup' %}">Sign up</a>
      {% endif %}
    </div>
  </nav>
</header>
<main class="container">
  {% block content %}{% endblock %}
</main>
<footer class="container muted">
  <p>sharko.icu forum</p>
</footer>
</body>
</html>
