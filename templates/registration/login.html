{% extends "base.html" %}
{% block title %}Log in{% endblock %}
{% block content %}
<form method="post" class="card form-card narrow">
  {% csrf_token %}
  <h1>Log in</h1>
  {{ form.as_p }}
  <input type="hidden" name="next" value="{{ next }}">
  <button type="submit" class="btn">Log in</button>
  <p class="meta">No account? <a href="{% url 'forum:signup' %}">Sign up</a> ·
    <a href="{% url 'password_reset' %}">Forgot password?</a></p>
</form>
{% endblock %}
